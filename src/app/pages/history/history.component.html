<ion-header>
  <ion-toolbar color="light">
    <ion-buttons slot="start">
      <ion-button routerLink="/">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>历史记录</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- 筛选器 -->
  <div class="filters">
    <ion-select 
      [(ngModel)]="filterCategory" 
      (ionChange)="onFilterChange()"
      interface="popover"
      class="filter-select">
      <ion-select-option value="全部">全部类型</ion-select-option>
      <ion-select-option value="学习">学习</ion-select-option>
      <ion-select-option value="工作">工作</ion-select-option>
      <ion-select-option value="锻炼">锻炼</ion-select-option>
    </ion-select>

    <ion-select 
      [(ngModel)]="filterDate" 
      (ionChange)="onFilterChange()"
      interface="popover"
      class="filter-select">
      <ion-select-option value="全部">全部时间</ion-select-option>
      <ion-select-option value="今天">今天</ion-select-option>
      <ion-select-option value="本周">本周</ion-select-option>
      <ion-select-option value="本月">本月</ion-select-option>
    </ion-select>
  </div>

  <!-- 搜索框 -->
  <ion-item class="search-item">
    <ion-icon name="search-outline" slot="start" color="medium"></ion-icon>
    <ion-input 
      [(ngModel)]="searchKeyword" 
      (ionInput)="onSearchChange()"
      placeholder="搜索内容..."
      clearInput="true">
    </ion-input>
  </ion-item>

  <ion-item-divider></ion-item-divider>

  <!-- 记录列表 -->
  <div class="activity-list">
    <div *ngIf="activities.length === 0" class="empty-state">
      <ion-icon name="document-text-outline" size="large" color="medium"></ion-icon>
      <ion-text color="medium">暂无记录</ion-text>
    </div>

    <ion-card *ngFor="let activity of activities" class="activity-card">
      <ion-card-content>
        <div class="activity-header">
          <span 
            class="category-badge" 
            [style.background-color]="colors[activity.category]">
            {{ activity.category }}
          </span>
          <span class="duration">{{ formatDuration(activity.duration_min) }}</span>
          <ion-button 
            fill="clear" 
            color="danger" 
            size="small"
            (click)="deleteActivity(activity.id)">
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </div>
        
        <div class="activity-content">{{ activity.content }}</div>
        
        <div class="activity-date">
          <ion-icon name="calendar-outline" size="small"></ion-icon>
          {{ activity.record_date }}
        </div>
        
        <div class="activity-note" *ngIf="activity.note">
          <ion-icon name="document-text-outline" size="small"></ion-icon>
          {{ activity.note }}
        </div>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- 底部留白 -->
  <div style="height: 80px;"></div>
</ion-content>

<!-- 悬浮添加按钮 -->
<ion-fab vertical="bottom" horizontal="center" slot="fixed">
  <ion-fab-button routerLink="/record" color="primary">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>
